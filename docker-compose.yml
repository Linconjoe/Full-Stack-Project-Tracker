services:
  web:
    build: .
    ports:
      - "0.0.0.0:5001:5000"
    restart: unless-stopped
    volumes:
      - .:/app
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=development
      - OLLAMA_API_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
